 <!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    {% seo %}
  </head>
  <body>
    <header class="page-header" role="banner">
      <nav class="navbar">
        <div class="navbar-brand">Kyle M. Chambers</div>
        <ul class="navbar-menu">
          <li class="navbar-item"><a href="#about-me" class="navbar-link">About Me</a></li>
          <li class="navbar-item"><a href="https://www.linkedin.com/in/kylemchambers" target="_blank" class="navbar-link">LinkedIn</a></li>
          <li class="navbar-item"><a href="https://www.dibiz.com/kchambers973" target="_blank" class="navbar-link">Contact</a></li>
          <li class="navbar-item"><a href="https://raw.githubusercontent.com/KyleMChambers/KyleMChambers.github.io/main/KCresume.pdf" class="navbar-link">Resume</a></li>
        </ul>
      </nav>
    </header>
    <main id="content" class="main-content" role="main">
      <section id="about-me">
        <h1>About Me</h1>
        <!-- Your about me content here -->
      </section>
      {{ content }}
    </main>
    <footer class="site-footer">
      {% if site.github.is_project_page %}
        <span class="site-footer-owner"><a href="{{ site.github.repository_url }}">{{ site.github.repository_name }}</a> is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>.</span>
      {% endif %}
      <span class="site-footer-credits">This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
    </footer>
  </body>
</html>
